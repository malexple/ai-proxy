server:
  port: ${PORT:8080}

spring:
  application:
    name: ai-proxy

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: INFO

app:

  security:
    enabled: true
    token: ${APP_PROXY_TOKEN:}

  providers:

    gemini:
      base-url: https://generativelanguage.googleapis.com
      auth:
        type: query
        parameter: key
        value: ${GEMINI_API_KEY}

    openai:
      base-url: https://api.openai.com
      auth:
        type: bearer
        value: ${OPENAI_API_KEY:}

    anthropic:
      base-url: https://api.anthropic.com
      auth:
        type: header
        header: x-api-key
        value: ${ANTHROPIC_API_KEY:}